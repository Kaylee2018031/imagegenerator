<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f6ff;
        --bg-2: #e8ecff;
        --card: #ffffff;
        --card-soft: #eef2ff;
        --text: #171d38;
        --muted: #55608d;
        --primary: #5f6fff;
        --primary-2: #39d8bc;
        --border: #c8d1ff;
      }

      body.dark {
        --bg: #0f1226;
        --bg-2: #1a1f48;
        --card: #171a35;
        --card-soft: #1f2350;
        --text: #f2f5ff;
        --muted: #a9b1d6;
        --primary: #7f8cff;
        --primary-2: #5ef0d8;
        --border: #2a3168;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, var(--bg-2) 0%, var(--bg) 55%, var(--bg) 100%);
        line-height: 1.4;
        transition: background 0.3s ease, color 0.3s ease;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.2rem;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .hero {
        text-align: center;
        margin: 1rem auto 1.5rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.6rem, 3vw, 2.6rem);
      }

      .hero p {
        margin: 0.6rem auto 0;
        color: var(--muted);
        max-width: 62ch;
      }

      .panel {
        background: color-mix(in srgb, var(--card) 96%, black 4%);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.7rem;
        align-items: center;
      }

      #prompt {
        width: 100%;
        background: var(--card-soft);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-size: 1rem;
        padding: 0.85rem 1rem;
        outline: none;
      }

      #prompt:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(127, 140, 255, 0.25);
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 0 0 rgba(95, 240, 216, 0.35); }
        70% { box-shadow: 0 0 0 12px rgba(95, 240, 216, 0); }
        100% { box-shadow: 0 0 0 0 rgba(95, 240, 216, 0); }
      }

      button {
        border: none;
        border-radius: 12px;
        color: #0f1330;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        padding: 0.85rem 1.1rem;
        background: linear-gradient(120deg, var(--primary), var(--primary-2));
        transition: transform 0.2s ease, filter 0.2s ease;
        animation: pulseGlow 2.2s infinite;
      }

      button:hover {
        transform: translateY(-2px) scale(1.01);
        filter: brightness(1.05);
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        animation: none;
      }

      .toggle {
        padding: 0.6rem 0.95rem;
        font-size: 0.9rem;
      }

      .gallery-wrap {
        margin-top: 1rem;
      }

      .gallery-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.7rem;
      }

      .gallery-head h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .hint {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .gallery {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      }

      .card {
        background: color-mix(in srgb, var(--card) 95%, black 5%);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .card img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
      }

      .card p {
        margin: 0;
        padding: 0.6rem 0.7rem;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .empty {
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 1.2rem;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 640px) {
        .header-row {
          flex-direction: column;
          align-items: stretch;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="dark">
    <main class="container">
      <section class="hero">
        <div class="header-row">
          <h1>Simple AI Image Generator</h1>
          <button id="themeToggle" class="toggle" aria-label="Toggle dark mode">☀️ Light Mode</button>
        </div>
        <p>
          Enter a prompt, generate a unique image, and build your gallery. This demo uses Pollinations
          to generate AI art from your text.
        </p>
      </section>

      <section class="panel" aria-label="Image generation controls">
        <div class="controls">
          <input id="prompt" type="text" placeholder="e.g., Futuristic city skyline at sunset" />
          <button id="generateBtn">Generate</button>
        </div>

        <div class="gallery-wrap">
          <div class="gallery-head">
            <h2>Image Gallery</h2>
            <span class="hint">Newest images appear first.</span>
          </div>
          <div id="gallery" class="gallery" aria-live="polite"></div>
          <div id="emptyState" class="empty">Your generated images will appear here.</div>
        </div>
      </section>
    </main>

    <script>
      const promptInput = document.getElementById("prompt");
      const generateBtn = document.getElementById("generateBtn");
      const gallery = document.getElementById("gallery");
      const emptyState = document.getElementById("emptyState");
      const themeToggle = document.getElementById("themeToggle");

      function updateThemeButton() {
        const isDark = document.body.classList.contains("dark");
        themeToggle.textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
      }

      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        updateThemeButton();
      });

      updateThemeButton();

      function renderCard(promptText, imageUrl) {
        const card = document.createElement("article");
        card.className = "card";

        const img = document.createElement("img");
        img.src = imageUrl;
        img.alt = `Generated image for prompt: ${promptText}`;
        img.loading = "lazy";

        const caption = document.createElement("p");
        caption.textContent = promptText;

        card.append(img, caption);
        gallery.prepend(card);
        emptyState.style.display = "none";
      }

      function buildImageUrl(promptText) {
        const seed = Math.floor(Math.random() * 1_000_000);
        return `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?nologo=true&seed=${seed}&width=1024&height=1024`;
      }

      async function handleGenerate() {
        const promptText = promptInput.value.trim();
        if (!promptText) {
          promptInput.focus();
          return;
        }

        generateBtn.disabled = true;
        generateBtn.textContent = "Generating...";

        try {
          const imageUrl = buildImageUrl(promptText);
          renderCard(promptText, imageUrl);
          promptInput.value = "";
        } finally {
          generateBtn.disabled = false;
          generateBtn.textContent = "Generate";
        }
      }

      generateBtn.addEventListener("click", handleGenerate);
      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          handleGenerate();
        }
      });
    </script>
  </body>
</html>
