<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspirational Quote Generator (English + Korean)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f8ff;
        --card: #ffffff;
        --text: #1f2950;
        --muted: #5e6b98;
        --primary: #5a6bff;
        --accent: #36d7b7;
        --border: #cad3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Noto Sans KR", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #e9eeff, var(--bg) 55%);
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 3.2vw, 2.3rem);
      }

      .intro {
        color: var(--muted);
        margin-top: 0.7rem;
        margin-bottom: 1.3rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.2rem;
        box-shadow: 0 16px 32px rgba(25, 35, 89, 0.12);
      }

      .actions {
        display: flex;
        gap: 0.65rem;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 0.8rem 1rem;
        cursor: pointer;
        font-size: 0.98rem;
        font-weight: 700;
        background: linear-gradient(120deg, var(--primary), var(--accent));
        color: #111733;
      }

      .secondary {
        background: #e8edff;
        color: #1d2652;
      }

      .quote-box {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fbfcff;
      }

      blockquote {
        margin: 0;
        font-size: clamp(1.1rem, 2.6vw, 1.35rem);
        font-weight: 600;
      }

      .korean {
        margin-top: 0.75rem;
        font-family: "Noto Sans KR", "Inter", sans-serif;
        font-size: clamp(1.05rem, 2.4vw, 1.22rem);
      }

      .author {
        margin-top: 0.75rem;
        color: var(--muted);
      }

      .history {
        margin-top: 1.1rem;
      }

      .history h2 {
        margin: 0 0 0.55rem;
        font-size: 1.05rem;
      }

      ul {
        margin: 0;
        padding-left: 1rem;
      }

      li {
        margin-bottom: 0.55rem;
      }

      @media (max-width: 540px) {
        .container {
          padding: 1rem;
        }

        .actions button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Inspirational Quote Generator</h1>
      <p class="intro">
        Generate motivational quotes in English and instantly view their Korean translations.
      </p>

      <section class="card" aria-label="Quote generator">
        <div class="actions">
          <button id="generateBtn" type="button">Generate New Quote</button>
          <button id="copyBtn" type="button" class="secondary">Copy Both Lines</button>
        </div>

        <div class="quote-box" aria-live="polite">
          <blockquote id="englishQuote">Press “Generate New Quote” to begin.</blockquote>
          <p id="koreanQuote" class="korean">“새로운 명언 생성” 버튼을 눌러 시작하세요.</p>
          <p id="quoteAuthor" class="author"></p>
        </div>

        <section class="history" aria-label="Recently generated quotes">
          <h2>Recent Quotes</h2>
          <ul id="historyList"></ul>
        </section>
      </section>
    </main>

    <script>
      const quotes = [
        {
          english: "Success is the sum of small efforts, repeated day in and day out.",
          korean: "성공은 날마다 반복되는 작은 노력들의 합입니다.",
          author: "Robert Collier"
        },
        {
          english: "The future depends on what you do today.",
          korean: "미래는 오늘 당신이 무엇을 하느냐에 달려 있습니다.",
          author: "Mahatma Gandhi"
        },
        {
          english: "Start where you are. Use what you have. Do what you can.",
          korean: "지금 있는 곳에서 시작하고, 가진 것을 활용하며, 할 수 있는 일을 하세요.",
          author: "Arthur Ashe"
        },
        {
          english: "Believe you can and you're halfway there.",
          korean: "할 수 있다고 믿는 순간, 이미 절반은 이룬 것입니다.",
          author: "Theodore Roosevelt"
        },
        {
          english: "It always seems impossible until it's done.",
          korean: "해내기 전까지는 언제나 불가능해 보입니다.",
          author: "Nelson Mandela"
        },
        {
          english: "Your present circumstances don't determine where you can go; they merely determine where you start.",
          korean: "현재의 상황은 당신의 도착지를 결정하지 않고, 단지 출발점을 정할 뿐입니다.",
          author: "Nido Qubein"
        },
        {
          english: "Dream big and dare to fail.",
          korean: "크게 꿈꾸고, 실패할 용기도 가지세요.",
          author: "Norman Vaughan"
        }
      ];

      const historyLimit = 5;
      const usedIndexes = new Set();
      const historyItems = [];

      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const englishQuote = document.getElementById("englishQuote");
      const koreanQuote = document.getElementById("koreanQuote");
      const quoteAuthor = document.getElementById("quoteAuthor");
      const historyList = document.getElementById("historyList");

      function pickRandomIndex() {
        if (usedIndexes.size === quotes.length) {
          usedIndexes.clear();
        }

        let index = Math.floor(Math.random() * quotes.length);
        while (usedIndexes.has(index)) {
          index = Math.floor(Math.random() * quotes.length);
        }

        usedIndexes.add(index);
        return index;
      }

      function renderHistory() {
        historyList.innerHTML = "";

        historyItems.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.english} / ${item.korean}`;
          historyList.appendChild(li);
        });
      }

      function generateQuote() {
        const quote = quotes[pickRandomIndex()];
        englishQuote.textContent = `“${quote.english}”`;
        koreanQuote.textContent = `“${quote.korean}”`;
        quoteAuthor.textContent = `— ${quote.author}`;

        historyItems.unshift(quote);
        if (historyItems.length > historyLimit) {
          historyItems.pop();
        }

        renderHistory();
      }

      async function copyQuote() {
        const combined = `${englishQuote.textContent}\n${koreanQuote.textContent}\n${quoteAuthor.textContent}`;

        try {
          await navigator.clipboard.writeText(combined);
          copyBtn.textContent = "Copied!";
          setTimeout(() => {
            copyBtn.textContent = "Copy Both Lines";
          }, 1200);
        } catch {
          copyBtn.textContent = "Copy Failed";
          setTimeout(() => {
            copyBtn.textContent = "Copy Both Lines";
          }, 1500);
        }
      }

      generateBtn.addEventListener("click", generateQuote);
      copyBtn.addEventListener("click", copyQuote);
    </script>
  </body>
</html>
